name: ${COMPOSE_PROJECT_NAME:-urinavi}

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      # docker-entrypoint-initdb.d は「空のvolumeで初回起動したときだけ」自動実行される。
      # 既にvolumeがある状態でスキーマ/seedを変更した場合は自動実行されないため、
      # `docker compose exec api npm run db:migrate` / `db:seed` を使うこと（README参照）。
      - ./database/migrations/0001_init_schema.sql:/docker-entrypoint-initdb.d/0001_init_schema.sql:ro
      - ./database/seeds/0001_seed_core_data.sql:/docker-entrypoint-initdb.d/0002_seed_core_data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
      - ./database:/usr/src/app/database:ro
    depends_on:
      db:
        condition: service_healthy

  customer-web:
    build:
      context: ./customer-web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      # customer-webコンテナからapiコンテナへプロキシするための内部URL（ブラウザには公開されない）。
      VITE_API_PROXY_TARGET: http://api:4000
    ports:
      - "${CUSTOMER_WEB_PORT:-5173}:5173"
    volumes:
      - ./customer-web:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - api

volumes:
  db_data:
